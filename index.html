<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>M1D1SL0P2</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="pc"></canvas>
<div id="audio-out-jack" class="port-jack" data-module="audio-out-0" data-port="in" style="--jh:0"></div>
<div id="status">connecting to MIDI...</div>
<div id="bpm"></div>

<div id="mp-ui">
  <span id="mp-dot" class="mp-dot mp-solo"></span>
</div>

<div id="mp-overlay">
  <span>connecting to partner...</span>
</div>

<div id="game-controls">
  <button id="mode-btn">PLAY</button>
  <div class="key-selector">
    <select id="key-root">
      <option>C</option><option>C#</option><option>D</option><option>D#</option>
      <option>E</option><option>F</option><option>F#</option><option>G</option>
      <option>G#</option><option>A</option><option>A#</option><option>B</option>
    </select>
    <select id="key-scale">
      <option value="major">MAJOR</option>
      <option value="minor">MINOR</option>
      <option value="dorian">DORIAN</option>
      <option value="mixolydian">MIXO</option>
      <option value="phrygian">PHRYG</option>
      <option value="lydian">LYDIAN</option>
    </select>
  </div>
  <span id="bpm-display"></span>
  <button id="bpm-ext-btn" title="Toggle external MIDI clock">EXT</button>
  <button id="keys-btn" class="active">KEYS</button>
  <button id="mods-btn" class="active">MODS</button>
  <button id="mode-panel-btn">MENU</button>
  <button id="shop-btn" class="locked" title="Unlocks at Level 2">SHOP</button>
  <button id="midi-learn-btn" title="MIDI Learn: click, then click a knob, then turn an encoder">MIDI LEARN</button>
</div>

<!-- Mode panel -->
<div id="mode-panel">
  <div class="mode-panel-header">
    <span class="mode-panel-title">MENU</span>
    <button id="mode-panel-close">✕</button>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" data-tab="game">GAME</button>
    <button class="mode-tab" data-tab="options">OPTIONS</button>
  </div>

  <div class="mode-tab-body">
  <div class="mode-tab-pane" data-pane="game">
    <div class="mode-section">
      <div class="mode-section-label">SOLO</div>
      <button class="mode-opt active" data-mode="play">
        <span class="mode-opt-name">PLAY</span>
        <span class="mode-opt-desc">chord challenges</span>
      </button>
      <button class="mode-opt mode-opt-locked" data-mode="ear" id="mode-opt-ear">
        <span class="mode-opt-name">EAR</span>
        <span class="mode-opt-desc">listen and identify</span>
        <span class="mode-opt-tag">unlocks lv 10</span>
      </button>
    </div>

    <div class="mode-section">
      <div class="mode-section-label">MULTIPLAYER</div>
      <button class="mode-opt" data-mode="coop">
        <span class="mode-opt-name">CO-OP</span>
        <span class="mode-opt-desc">shared synth, shared challenges</span>
      </button>
      <button class="mode-opt" data-mode="competitive">
        <span class="mode-opt-name">COMPETITIVE</span>
        <span class="mode-opt-desc">first to solve — head to head</span>
      </button>
      <button class="mode-opt" data-mode="tennis">
        <span class="mode-opt-name">TENNIS</span>
        <span class="mode-opt-desc">serve and return</span>
      </button>
    </div>

    <div class="mode-section">
      <div class="mode-section-label">PARTNER</div>
      <div class="mode-partner-row">
        <span id="mode-mp-dot" class="mp-dot mp-solo"></span>
        <span id="mode-mp-status">no partner</span>
      </div>
      <button id="mode-share-btn">COPY INVITE LINK</button>
      <button id="mode-disconnect-btn" class="mode-disconnect-btn">DISCONNECT</button>
    </div>

    <div class="mode-section mode-section-newgame">
      <button id="mode-new-game-btn">NEW GAME</button>
    </div>
  </div>

  <div class="mode-tab-pane mode-tab-pane-hidden" data-pane="options">
    <div class="mode-section">
      <div class="mode-section-label">CONTROLS POSITION</div>
      <div class="ctrl-pos-group">
        <button class="ctrl-pos-opt active" data-pos="below">BELOW KEYS</button>
        <button class="ctrl-pos-opt" data-pos="above">ABOVE KEYS</button>
        <button class="ctrl-pos-opt" data-pos="top">TOP</button>
      </div>
    </div>
    <div class="mode-section" style="border-bottom:none;padding-bottom:10px;">
      <div class="mode-toggle-row">
        <span class="mode-toggle-label">QWERTY KEY GUIDE</span>
        <button class="mode-toggle on" id="opt-keyguides" data-fx="keyGuides"></button>
      </div>
      <div class="mode-toggle-row">
        <span class="mode-toggle-label">EXTERNAL MIDI CLOCK</span>
        <button class="mode-toggle" id="opt-midiclock"></button>
      </div>
    </div>
  </div>
  </div><!-- .mode-tab-body -->
</div>

<!-- New game confirm -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <div id="confirm-msg">start a new game?</div>
    <div id="confirm-sub">score and progress will be reset</div>
    <div id="confirm-btns">
      <button id="confirm-yes">START</button>
      <button id="confirm-no">CANCEL</button>
    </div>
  </div>
</div>

<div id="custom-btns"></div>

<div id="hud">
  <div id="remote-score-area">
    <div id="remote-score-label">bob</div>
    <div id="remote-score-val">0</div>
  </div>
  <div id="score-val">0</div>
  <div id="level-val">LEVEL 1</div>
  <div id="streak-val"></div>
</div>

<div id="challenge">
  <div class="prompt">play</div>
  <div class="chord-name" id="challenge-name"></div>
  <div class="hint-label" id="hint-label"></div>
  <div id="challenge-timer-bar"><div id="challenge-timer-fill"></div></div>
  <div id="challenge-timer-secs">5s</div>
</div>

<div id="panels-container"></div>

<div id="shop-panel">
  <div class="shop-header">
    <span class="shop-title">MODULE SHOP</span>
    <span id="shop-balance">0 pts</span>
    <button id="shop-close-btn">✕</button>
  </div>
  <div id="shop-tabs" class="shop-tabs">
    <button class="shop-tab active" data-tab="voices">VOICES</button>
    <button class="shop-tab" data-tab="fx">FX</button>
    <button class="shop-tab" data-tab="cv">CV</button>
  </div>
  <div id="shop-items"></div>
</div>

<div id="chat-panel">
  <div class="chat-header">
    <span class="chat-title">CONSOLE</span>
    <button id="chat-close-btn">✕</button>
  </div>
  <div id="chat-messages"></div>
  <div id="console-wrap">
    <span id="console-prompt">&gt;</span>
    <input id="cheat-input" autocomplete="off" spellcheck="false" placeholder="message · >help">
  </div>
</div>

<div id="levelup"></div>
<div id="label"></div>
<div id="feedback"></div>
<div id="notes"></div>

<script type="module">
import { Chord, Scale } from 'https://esm.sh/tonal@6';
window.Chord = Chord;
window.Scale = Scale;
async function load(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}
await load('config.js');
await load('audio.js');
await load('synth-ui.js');
await load('multiplayer.js');
await load('app.js');
</script>
</body></html>
